services:
  - type: web
    name: nse-stock-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    envVars:
      - key: DB_PATH
        value: /tmp/stocks.db
    disk:
      name: stocksdb
      mountPath: /data
      sizeGB: 1